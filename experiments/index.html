<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>experiment</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font: 13px/1.4 ui-monospace, monospace;
        background: #000;
        color: #eee;
        overflow: hidden;
      }
      /* Canvas fills the entire viewport. */
      body > canvas {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
        display: block !important;
        background: #000;
      }
      /* Status log overlays the top of the canvas — semi-transparent
         backdrop, click-through so it doesn't interfere with the
         experiment's hit testing. */
      pre#status {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        max-height: 30vh;
        overflow-y: auto;
        margin: 0;
        padding: 8px;
        background: rgba(0, 0, 0, 0.75);
        z-index: 10;
        pointer-events: none;
        white-space: pre-wrap;
        word-break: break-word;
        text-shadow: 0 0 2px #000;
      }
    </style>
  </head>
  <body>
    <pre id="status">experiment harness — pass ?experiment=&lt;name&gt;</pre>
    <script type="module">
      // Shared shell. Each experiment is just experiments/<name>/index.ts;
      // this loads the one named in the query string. harness/run-cdp.mjs
      // navigates here with ?experiment=<name>.
      const name = new URLSearchParams(location.search).get("experiment")
      if (name && /^[a-z0-9_-]+$/.test(name)) {
        document.title = `experiment · ${name}`
        // Auto-scroll the status pre so the newest log line stays in
        // view as experiments append status lines.
        const status = document.querySelector("#status")
        const observer = new MutationObserver(() => {
          status.scrollTop = status.scrollHeight
        })
        observer.observe(status, { childList: true, characterData: true, subtree: true })
        import(`./${name}/index.ts`)
      } else {
        document.querySelector("#status").textContent =
          "missing or invalid ?experiment=<name> in the URL"
      }
    </script>
  </body>
</html>
